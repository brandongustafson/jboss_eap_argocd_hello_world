apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  # ArgoCD manages apps from the argocd namespace
  namespace: argocd
  labels:
    app: hello-world
  # Finalizer ensures ArgoCD cleans up the app's resources when deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # ── UPDATE THIS ──────────────────────────────────────────────────────────
    # Point this to YOUR Git repository containing the k8s/ folder.
    # ArgoCD will watch this repo and sync any changes automatically.
    repoURL: https://github.com/YOUR_USERNAME/hello-world.git
    targetRevision: HEAD   # track the default branch (main/master)
    path: k8s              # folder inside the repo containing the manifests
    # ─────────────────────────────────────────────────────────────────────────

  destination:
    # Deploy to the same cluster ArgoCD is running in
    server: https://kubernetes.default.svc
    namespace: hello-world

  syncPolicy:
    automated:
      # Automatically sync when Git changes are detected
      prune: true      # delete resources removed from Git
      selfHeal: true   # revert manual kubectl changes to match Git
    syncOptions:
      - CreateNamespace=true   # create the namespace if it doesn't exist
