apiVersion: v1
kind: Service
metadata:
  name: hello-world
  namespace: hello-world
  labels:
    app: hello-world
spec:
  # ClusterIP makes the service reachable inside the cluster.
  # The Route (OpenShift) or Ingress exposes it externally.
  type: ClusterIP
  selector:
    app: hello-world
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
