<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 60px 80px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 0 0 40px rgba(99, 179, 237, 0.6);
        }

        .subtitle {
            margin-top: 16px;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .badges {
            margin-top: 32px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(99, 179, 237, 0.15);
            border: 1px solid rgba(99, 179, 237, 0.3);
            color: #63b3ed;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 th:text="${message}">HELLO WORLD</h1>
        <p class="subtitle">Spring Boot · JBoss EAP 7.4 · Docker · OpenShift · ArgoCD</p>
        <div class="badges">
            <span class="badge">Spring Boot 2.7</span>
            <span class="badge">Java 11</span>
            <span class="badge">JBoss EAP 7.4</span>
            <span class="badge">GitOps</span>
        </div>
    </div>
</body>
</html>
